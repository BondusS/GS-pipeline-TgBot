
trainer:
  precision: null
  max_epochs: 80
  max_steps: -1
  log_every_n_steps: 1
  max_time: null
  val_check_interval: null
  check_val_every_n_epoch: 20
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  detect_anomaly: false
  barebones: false
model:
  light_gaussian:
    prune_steps: []
    prune_decay: 1.0
    prune_percent: 0.66
    prune_type: v_important_score
    v_pow: 0.1
  gaussian:
    class_path: internal.models.vanilla_gaussian.VanillaGaussian
    init_args:
      sh_degree: 2
      optimization:
        means_lr_init: 6.4e-06
        means_lr_scheduler:
          class_path: internal.schedulers.ExponentialDecayScheduler
          init_args:
            lr_pre_warmup: 1.0e-08
            lr_final: 6.4e-07
            warmup_steps: 0
            max_steps: 240000
            ramp: cosine
        spatial_lr_scale: -1.0
        shs_dc_lr: 0.0025
        shs_rest_lr: 0.000125
        opacities_lr: 0.05
        scales_lr: 0.004
        rotations_lr: 0.001
        sh_degree_up_interval: 1000
  correct_color: false
  test_speed: false
  save_val_output: false
  save_val_metrics: null
  max_save_val_output: -1
  random_background: true
  renderer:
    class_path: internal.renderers.gsplat_v1_renderer.GSplatV1Renderer
    init_args:
      separate_sh: true
      tile_based_culling: true
      anti_aliased: true
  metric:
    class_path: internal.metrics.inverse_depth_metrics.HasInverseDepthMetrics
    init_args:
      lambda_dssim: 0.8
      ssim_window_size: 11
      rgb_diff_loss: l1
      fused_ssim: false
      depth_loss_type: l1+ssim
      depth_loss_ssim_weight: 1.0
      depth_loss_weight:
        init: 0.5
        final_factor: 0.05
        max_steps: 30000
      depth_normalized: false
      depth_output_key: inverse_depth
  density:
    class_path: internal.density_controllers.resgs_density_controller.ResGSDensityController
    init_args:
      absgrad: true
      densify_grad_threshold: 0.0006
      opacity_reduce_weight: 0.3
      residual_split_scale_div: 1.6
      percent_dense: 0.01
      densification_epoch_interval: 0.5
      opacity_reset_epoch_interval: 7000
      densify_from_iter: 0
      densify_until_iter: 100000000
      densify_until_iter_epoch: 70
      densify_grad_threshold: 5.0e-05
      cull_opacity_threshold: 0.05
      camera_extent_factor: 1.0
      scene_extent_override: -1.0
      surface_area_threshold: 100000000.0
      densify_grad_scaler: 0.0
      residual_split_scale_div: 1.6
      level_update_value: 1.2
      current_stage: 2
  postprocess:
        class_path: internal.utils.scale_clipping.ScaleClipping   
        init_args:
            global_scale: 1.0
            max_size_sphere: 7
  save_ply: false
  web_viewer: true
  initialize_from: null
data:
  path: YOUR PATH HERE
  parser:
    class_path: internal.dataparsers.EstimatedDepthBlockColmap
    init_args:
      image_dir: null
      mask_dir: YOUR PATH HERE/masks_2.0
      split_mode: reconstruction
      eval_image_select_mode: step
      eval_step: 8
      eval_ratio: 0.01
      eval_list: null
      scene_scale: 1.0
      reorient: false
      appearance_groups: null
      image_list: null
      down_sample_factor: 2
      down_sample_rounding_mode: round
      points_from: sfm
      ply_file: null
      n_random_points: 100000
      force_pinhole: false
      block_id: null
      block_dim:
      - YOUR DIM HERE
      - YOUR DIM HERE
      aabb: null
      num_threshold: 25000
      content_threshold: 0.15
      partitions_path: 'partition/main_partition'
      depth_dir: null
      depth_rescaling: true
      depth_scale_name: estimated_depth_scales
      depth_scale_lower_bound: 0.2
      depth_scale_upper_bound: 5.0
  distributed: false
  undistort_image: false
  image_scale_factor: 1.0
  train_max_num_images_to_cache: 22
  val_max_num_images_to_cache: 22
  test_max_num_images_to_cache: 22
  num_workers: 2
  add_background_sphere: true
  background_sphere_visibility_filter: true
  background_sphere_center: points
  background_sphere_distance: 3.0
  background_sphere_points: 204800
  background_sphere_color: random
  background_sphere_min_altitude: auto
  background_sphere_up: auto
  camera_on_cpu: false
  image_on_cpu: true
  image_uint8: false
  async_caching: true
name: results
version: main
save_iterations:
- 10000
save_epochs:
- 1
- 5
- 10
- 15
- 20
- 30
- 40
- 50
- 60
- 70
- 80
- 90
- 100
- 110
- 120
- 130
- 140
logger: tensorboard
output: YOUR PATH HERE
float32_matmul_precision: null
viewer: true
save_val: false
val_train: false
cache_all_images: false
ipt: false
sample_ratio: 1.0
max_splats: 8000000
non_train: []

